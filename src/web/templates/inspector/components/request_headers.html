<div class="tab-pane active" id="tab-headers">
    <p class="text-uppercase text-secondary fw-semibold mb-2" style="font-size:11px;letter-spacing:.08em;">
        Request Headers
    </p>
    <table class="table table-dark table-sm table-bordered align-middle font-monospace small"
           id="headers-table"
    >
        {% if webhook_requests %}
            {% for key, value in webhook_requests[0].headers.items() %}
                <tr>
                    <td class="text-secondary w-35" style="width:35%;">{{ key }}</td>
                    <td class="text-light">{{ value }}</td>
                </tr>
            {% endfor %}
        {% endif %}
    </table>
</div>
