<!doctype html>
<html lang="en" class="h-100">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      integrity="sha384-tViUnnbYAV00FLIhhi3v/dWt3Jxw4gZQcNoSCxCIFNJVCx7/D55/wXsrNIRANwdD"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap"
      crossorigin="anonymous"
    />
    <title>{% block title %}Webhook Inspector{% endblock %}</title>
    <style>
      * {
          box-sizing: border-box;
          margin: 0;
          padding: 0;
      }

      body {
          font-family: "Segoe UI", Robot, sans-serif;
          background: #0f172a;
          -ms-overflow-style: none;  /* IE & Edge */
          scrollbar-width: none;
      }

      body::-webkit-scrollbar {
          display: none;
      }

      /* Live pulse — no Bootstrap equivalent */
      @keyframes livepulse {
          0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,.5); }
          50% { box-shadow: 0 0 0 5px rgba(34,197,94,0); }
      }

      .live-dot { animation: livepulse 2s infinite; }

      header {
          background: linear-gradient(90deg, #6366f1, #06b6d6);
          width: 1000px;
      }

      {% block extra_styles %}{% endblock %}
    </style>
  </head>
  <body class="d-flex flex-column h-100 text-light">
    <header
      class="d-flex fs-5 border border-primary mx-auto mt-3 p-2 rounded-3 align-items-center justify-content-between"
    >
      <h3 class="ms-4 mb-0">Webhook Inspector</h3>
      <a class="fw-bold me-4 text-decoration-none text-white" href="/">
        <i class="bi bi-house"></i>
        Home
      </a>
    </header>

    <main class="flex-grow-1 d-flex flex-column">
      {% block main %}
      <div class="container">{% block content %}{% endblock %}</div>
      {% endblock %}
    </main>

    <footer class="text-center py-3 flex-shrink-0">
      <small class="text-secondary">
        © Webhook Inspector. All rights reserved<br />By Elisha Onyando
      </small>
    </footer>

    <script src="{{ url_for('static', path='js/config.js') }}"></script>
    <script src="{{ url_for('static', path='js/app.js') }}"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    {% block extra_scripts %}{% endblock %}
  </body>
</html>
